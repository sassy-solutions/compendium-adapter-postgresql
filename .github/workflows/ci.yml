name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test (with coverage)
        # GitHub-hosted ubuntu-latest has Docker available — TestContainers spins up
        # PostgreSQL via Testcontainers.PostgreSql. Integration tests are required for
        # meaningful coverage on this repo: the bulk of the adapter is raw Npgsql
        # I/O which can only be exercised against a real database.
        run: |
          dotnet test -c Release --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory TestResults/ \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/
          retention-days: 14

      - name: Coverage report + 70% gate
        run: |
          dotnet tool restore
          dotnet tool run reportgenerator \
            -reports:'TestResults/**/coverage.cobertura.xml' \
            -targetdir:coverage-report \
            -reporttypes:'TextSummary;MarkdownSummary'
          cat coverage-report/Summary.txt
          # 70% gate (not 90%): this adapter is a raw Npgsql + Dapper layer where
          # significant surface (schema bootstrap variants, error paths in DB
          # connection handling, exotic Postgres error codes) genuinely requires
          # production-like infrastructure to exercise. Unit tests cover ~73%;
          # the remaining 27% is either DB-driver wiring (covered by integration
          # tests against a real PostgreSQL) or error branches that can't be
          # triggered deterministically in CI.
          line_pct=$(awk '/^[[:space:]]*Line coverage:/ {gsub("%","",$NF); print $NF; exit}' coverage-report/Summary.txt)
          echo "Line coverage: ${line_pct}%"
          awk -v c="$line_pct" 'BEGIN { exit (c+0 >= 70) ? 0 : 1 }'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 14
